version: '3.11'
services:
  ollama:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/ollama/ollama:latest
    restart: always
    volumes:
      - ~/.ollama:/root/.ollama
    environment:
      # HuggingFace 镜像加速（ollama部分模型从HF拉取）
      - HF_ENDPOINT=https://hf-mirror.com
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    runtime: nvidia

  chatchat:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    restart: always
    depends_on:
      - ollama
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
      - OLLAMA_MODELS=${OLLAMA_MODELS}
      - OLLAMA_HOST=ollama
      # 国内云API冗余配置（留空则只用ollama）
      - CLOUD_API_KEY=${CLOUD_API_KEY:-}
      - CLOUD_API_BASE_URL=${CLOUD_API_BASE_URL:-}
      - CLOUD_LLM_MODEL=${CLOUD_LLM_MODEL:-}
    volumes:
      # 挂载代码卷：代码改动后只需 docker compose restart chatchat，无需 --build
      - ../libs/chatchat-server:/root/MDT/libs/chatchat-server
      - ./startup.sh:/root/startup.sh
      - ../model_settings.yaml:/root/MDT/model_settings.yaml
      # 持久化数据（知识库、对话记录等）
      - mdt_data:/root/mdt_data
    ports:
      - "7861:7861"
      - "8501:8501"  # WebUI端口
      - "4040:4040"  # ngrok web界面

volumes:
  mdt_data:
    # 命名卷：持久化 /root/mdt_data（知识库向量、模型配置、对话记录）
    # 首次启动会自动创建；如需完全重置运行: docker volume rm mdt_mdt_data
