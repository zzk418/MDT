version: '3.11'
services:
  ollama:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/ollama/ollama:latest
    restart: always
    volumes:
      - ~/.ollama:/root/.ollama
    environment:
      # HuggingFace 镜像加速（ollama部分模型从HF拉取）
      - HF_ENDPOINT=https://hf-mirror.com
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    runtime: nvidia

  chatchat:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    restart: always
    depends_on:
      - ollama
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
      - OLLAMA_MODELS=${OLLAMA_MODELS}
      - OLLAMA_HOST=ollama
      # 国内云API冗余配置（留空则只用ollama）
      - CLOUD_API_KEY=${CLOUD_API_KEY:-}
      - CLOUD_API_BASE_URL=${CLOUD_API_BASE_URL:-}
      - CLOUD_LLM_MODEL=${CLOUD_LLM_MODEL:-}
    volumes:
      # 持久化其余数据（对话记录、临时文件等），先挂载命名卷作为基础
      - mdt_data:/root/mdt_data
      # 挂载代码卷：代码改动后只需 docker compose restart chatchat，无需 --build
      - ../libs/chatchat-server:/root/MDT/libs/chatchat-server
      # 挂载配置文件（根目录统一维护）：修改后只需 restart，无需 --build
      - ../basic_settings.yaml:/root/mdt_data/basic_settings.yaml
      - ../kb_settings.yaml:/root/mdt_data/kb_settings.yaml
      - ../model_settings.yaml:/root/mdt_data/model_settings.yaml
      - ../prompt_settings.yaml:/root/mdt_data/prompt_settings.yaml
      - ../tool_settings.yaml:/root/mdt_data/tool_settings.yaml
      # 挂载知识库数据：本地 data/ 与容器同步，方便直接管理文件（覆盖命名卷中的同名目录）
      - ../data/knowledge_base:/root/mdt_data/data/knowledge_base
    ports:
      - "7861:7861"
      - "8501:8501"  # WebUI端口
      - "4040:4040"  # ngrok web界面

volumes:
  mdt_data:
    # 命名卷：持久化 /root/mdt_data（知识库向量、模型配置、对话记录）
    # 首次启动会自动创建；如需完全重置运行: docker volume rm mdt_mdt_data
