version: '3.11'
services:
  ollama:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/ollama/ollama:latest
    restart: always
    volumes:
      - ~/.ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    runtime: nvidia

  chatchat:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    restart: always
    depends_on:
      - ollama
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
      - OLLAMA_MODELS=${OLLAMA_MODELS}
      - OLLAMA_HOST=ollama
    #volumes:
    #  - ../data:/root/MDT/mdt_data
    #  - ../libs/chatchat-server:/root/MDT/libs/chatchat-server
    ports:
      - "7861:7861"
      - "8501:8501"  # WebUI端口
      - "4040:4040"  # ngrok web界面
